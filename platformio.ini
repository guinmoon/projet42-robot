; https://docs.platformio.org/page/projectconf.html

[env:upesy_wroom]
; platform = espressif32
; board = nodemcu-32s
board = esp32doit-devkit-v1
framework = arduino
upload_speed = 460800
monitor_speed = 115200
upload_protocol = esptool
upload_resetmethod = nodemcu
board_build.partitions = partitions.csv
monitor_port = COM3
upload_port = COM3
monitor_rts = 0
monitor_dtr = 0
; extra_scripts = pre:extra_scripts/pre_upload.py
; platform = platformio/espressif32
platform = https://github.com/Jason2866/platform-espressif32.git#Arduino/IDF53
; board = esp32dev
; framework = arduino
; monitor_speed = 115200
; upload_speed = 115200
lib_deps = 
    madhephaestus/ESP32Servo @ 3.1.3
    ; bodmer/TFT_eSPI@^2.5.31
build_flags = 
    ; -D USER_SETUP_LOADED=1
    ; -D ST7789_2_DRIVER=1
    ; -D TFT_WIDTH=240
    ; -D TFT_HEIGHT=240
    ; -D TFT_MISO=19
    ; -D TFT_MOSI=14
    ; -D TFT_SCLK=12
    ; -D TFT_CS=15
    ; -D TFT_DC=26
    ; -D TFT_RST=27
    ; ; -D TFT_MOSI=23
    ; ; -D TFT_SCLK=18
    ; ; -D TFT_CS=15
    ; ; -D TFT_DC=2
    ; ; -D TFT_RST=4
    ; -D TOUCH_CS=-1
    ; -D TFT_BL=21
    ; -D TFT_BACKLIGHT_ON=HIGH
    ; -D TFT_RGB_ORDER=TFT_RGB
    ; -D LOAD_GLCD=1
    ; -D LOAD_FONT2=1
    ; -D LOAD_FONT4=1
    ; -D LOAD_FONT6=1
    ; -D LOAD_FONT7=1
    ; -D LOAD_FONT8=1
    ; -D LOAD_FONT8N=1
    ; -D LOAD_GFXFF=1
    ; -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000